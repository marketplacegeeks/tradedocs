name: CI

# Runs on every push to main.
# Railway is configured to wait for this check before deploying.
on:
  push:
    branches: [main]

jobs:
  # ── Backend: run all pytest tests against a real PostgreSQL database ──
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tradetocs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          TRADETOCS_SECRET_KEY: ci-only-secret-key-not-used-in-production
          TRADETOCS_DEBUG: "True"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/tradetocs
        run: pytest

  # ── Frontend: catch TypeScript errors before they reach Railway ──
  frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit
